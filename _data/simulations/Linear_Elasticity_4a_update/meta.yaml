_id: 69386760-beab-11e9-9786-cb6ab85cdbfe
metadata:
  author:
    first: Shubhajit
    last: Mondal
    email: sm44@iitbbs.ac.in
    github_id: smondal44
  timestamp: ''
  summary: >-
    In this problem, we solve the linear elasticity problem for circular
    homogeneous precipitate in effectively infinite domain.
  implementation:
    name: Fenics
    repo:
      url: 'https://github.com/smondal44/Linear-Elasticity/blob/master/r_Cir_ho_s.py'
      version: 24704aa86fc2faefe4480f1925124620b6f6a8a1
    container_url: ''
  hardware:
    cpu_architecture: x86_64
    acc_architecture: none
    parallel_model: serial
    clock_rate: '2.4'
    cores: '1'
    nodes: '1'
benchmark:
  id: 4a
  version: '1'
data:
  - name: run_time
    values:
      - wall_time: '36000'
        sim_time: '36000'
  - name: memory_usage
    values:
      - unit: KB
        value: '8388608'
  - name: Euilibrium_data
    url: >-
      https://raw.githubusercontent.com/smondal44/Linear-Elasticity/master/4a_eq_data_format.csv
    format:
      type: csv
      parse:
        x: number
        'y': number
    description: >-
      The equilibrium data contains the coordinate of the contour plot at
      equilibrium. We plot the contour plot at the value of order parameter is
      equal to 0.5.
    type: line
    transform:
      - type: formula
        expr: datum.x
        as: x
      - type: formula
        expr: datum.y
        as: 'y'
  - name: Energy_data
    url: >-
      https://raw.githubusercontent.com/smondal44/Linear-Elasticity/master/4a_energy_data.csv
    format:
      type: csv
      parse:
        time: number
        Energy: number
    description: >-
      Here, the data file includes the time, elastic, bulk, gradient and total
      free energy of the system. 
    type: line
    transform:
      - type: formula
        expr: datum.time
        as: x
      - type: formula
        expr: datum.Energy
        as: 'y'
  - name: Energy_plot1
    url: >-
      https://github.com/smondal44/Linear-Elasticity/blob/master/4a_elastic_energy.png
    type: image
    description: 'Here, we are plotting the elastic energy as a function of time.'
  - name: Energy_plot2
    url: >-
      https://github.com/smondal44/Linear-Elasticity/blob/master/4a_total_energy.png
    type: image
    description: >-
      Here, we are plotting the total free energy of the system as a function of
      time.
